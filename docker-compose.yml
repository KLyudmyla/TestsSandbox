version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: integration_test_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: super_password123
      POSTGRES_DB: corporate_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
